<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Steam Review Editor - Edit and Preview your Steam Reviews before posting" />
    <!--
      manifest.json provides metadata used when your web app is added to the
      homescreen on Android. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <!--
      Notice the use of [redacted] in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <!-- Preconnect to font origins for faster DNS + TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />
    <!-- Non-render-blocking font loading -->
    <link
      href="https://fonts.googleapis.com/css?family=Raleway:400,500,600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      href="https://fonts.cdnfonts.com/css/motiva-sans-test"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css?family=Raleway:400,500,600&display=swap" rel="stylesheet" />
      <link href="https://fonts.cdnfonts.com/css/motiva-sans-test" rel="stylesheet" />
    </noscript>
    <title>Steam Review Editor - Edit and Preview in Realtime</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      var code = "";
      switch (location.hostname) {
        case "steam-review-editor.netlify.app":
          code = "sre";
          break;
        case "projects.claytoninnovations.com":
          code = "kenoc";
          break;
        default:
          code = "kenoc";
      }
      window.goatcounter = {
        endpoint: "https://" + code + ".goatcounter.com/count",
      };
    </script>
    <script async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
